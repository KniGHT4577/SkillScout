server {
    listen 8080;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    
    # Optional: proxy API requests if served from same domain
    # location /api/ {
    #     proxy_pass http://backend-service-name:8000/;
    # }
}
